server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Kompresi gzip supaya halaman lebih cepat dimuat
    gzip on;
    gzip_types text/css application/javascript text/javascript;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache file CSS & JS di browser pengunjung selama 7 hari
    location ~* \.(css|js)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # Kalau ada halaman yang tidak ditemukan, arahkan ke beranda
    error_page 404 /index.html;
}